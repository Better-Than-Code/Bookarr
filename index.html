<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookrr - Integrated Audiobook & Book Media Server</title>
    <!-- PWA Meta Tags & Manifest Link -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="A fully integrated book and audiobook media server, searcher, and reader suite." />
    <!-- Apple Web App Capable -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bookrr" />
    <!-- Service Worker Registration at early stage -->
    <script>
      if ('serviceWorker' in navigator) {
        // Build base path dynamically based on current location to support deployment under folders (like GitHub Pages)
        const base = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
        const swUrl = base + 'pwabuilder-sw.js';
        navigator.serviceWorker.register(swUrl, { scope: base })
          .then(function(reg) {
            console.log('Bookrr Service Worker registered successfully with scope:', reg.scope);
          })
          .catch(function(err) {
            console.error('Bookrr Service Worker registration failed:', err);
          });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
