<!doctype html><html><script src='https://cdnjs.cloudflare.com/ajax/libs/onnxruntime-web/1.18.0/ort.min.js'></script><script>async function test(){try{console.log(ort.env.wasm);const k = await fetch('https://huggingface.co/diffusionstudio/piper-voices/resolve/main/en/en_US/libritts/high/en_US-libritts-high.onnx'); const buf = await k.arrayBuffer(); const session = await ort.InferenceSession.create(buf.slice(0), {executionProviders:['webgpu']}); console.log('success webgpu', session)}catch(e){console.error('webgpu failed', e); try{ const session2 = await ort.InferenceSession.create(buf, {executionProviders:['wasm']}); console.log('success wasm', session2) }catch(err){console.error('wasm failed', err);}} }test()</script></html>
