<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Solid background extending to edges for maskable compatibility -->
  <rect width="100%" height="100%" fill="#6366f1" />
  
  <!-- Padded branding graphics container scaled 0.8x to ensure full safety within any cropping shape -->
  <g transform="translate(51, 51) scale(0.8)">
    <g fill="#ffffff">
      <!-- Left page of the book -->
      <path d="M 246,360 C 190,360 150,330 100,330 L 100,180 C 150,180 190,210 246,210 Z" />
      <!-- Right page of the book -->
      <path d="M 266,360 C 322,360 362,330 412,330 L 412,180 C 362,180 322,210 266,210 Z" />
      
      <!-- Spine bookmark ribbon draping down -->
      <path d="M 248,190 L 264,190 L 264,390 L 256,380 L 248,390 Z" fill="#f59e0b" />
      
      <!-- Hard book cover showing slightly at bottom -->
      <path d="M 246,370 C 185,370 145,340 94,340 L 94,330 C 145,330 185,360 246,360 Z" fill="#4338ca" />
      <path d="M 266,370 C 327,370 367,340 418,340 L 418,330 C 367,330 327,360 266,360 Z" fill="#4338ca" />
    </g>
    
    <g fill="#e0e7ff" opacity="0.9">
      <!-- Reading lines -->
      <rect x="130" y="235" width="80" height="8" rx="4" />
      <rect x="130" y="260" width="80" height="8" rx="4" />
      <rect x="130" y="285" width="50" height="8" rx="4" />
      
      <rect x="302" y="235" width="80" height="8" rx="4" />
      <rect x="302" y="260" width="80" height="8" rx="4" />
      <rect x="302" y="285" width="50" height="8" rx="4" />
    </g>
  </g>
</svg>
