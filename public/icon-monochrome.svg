<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Transparent background monochrome branding graphics for theme tinting inside safe borders -->
  <g transform="translate(51, 51) scale(0.8)" fill="#000000">
    <!-- Left page of the book -->
    <path d="M 246,360 C 190,360 150,330 100,330 L 100,180 C 150,180 190,210 246,210 Z" />
    <!-- Right page of the book -->
    <path d="M 266,360 C 322,360 362,330 412,330 L 412,180 C 362,180 322,210 266,210 Z" />
    
    <!-- Spine bookmark ribbon draping down -->
    <path d="M 248,190 L 264,190 L 264,390 L 256,380 L 248,390 Z" opacity="0.6" />
    
    <!-- Hard book cover showing slightly at bottom -->
    <path d="M 246,370 C 185,370 145,340 94,340 L 94,330 C 145,330 185,360 246,360 Z" opacity="0.8" />
    <path d="M 266,370 C 327,370 367,340 418,340 L 418,330 C 367,330 327,360 266,360 Z" opacity="0.8" />

    <!-- Reading line punchouts -->
    <rect x="130" y="235" width="80" height="8" rx="4" fill="#ffffff" opacity="0.9" />
    <rect x="130" y="260" width="80" height="8" rx="4" fill="#ffffff" opacity="0.9" />
    <rect x="130" y="285" width="50" height="8" rx="4" fill="#ffffff" opacity="0.9" />
    
    <rect x="302" y="235" width="80" height="8" rx="4" fill="#ffffff" opacity="0.9" />
    <rect x="302" y="260" width="80" height="8" rx="4" fill="#ffffff" opacity="0.9" />
    <rect x="302" y="285" width="50" height="8" rx="4" fill="#ffffff" opacity="0.9" />
  </g>
</svg>
